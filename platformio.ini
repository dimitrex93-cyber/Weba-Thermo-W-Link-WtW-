; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Base environment – shared settings, NO debug flags (keep clean for release)
[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_flags =
	-Wl,-Map,firmware.map
lib_deps =
	U8g2@>=2.34.0
	Adafruit BMP280 Library@>=2.6.8
	aht20@>=1.0.0
	arduino
board_build.f_cpu = 80000000L
board_build.filesystem = littlefs
monitor_port = /dev/ttyUSB*
upload_port = /dev/ttyUSB*

; Debug build – full logging, no optimisation, GDB symbols
[env:esp8266-debug]
extends = env:esp8266
build_flags =
	${env:esp8266.build_flags}
	-DENABLE_SERIAL_DEBUG=1
	-DDEBUG_INA226=1
	-DDEBUG_SENSORS=1
	-g
	-O0

; Release build – logging off, aggressive optimisation, dead-code stripped
[env:esp8266-release]
extends = env:esp8266
build_flags =
	${env:esp8266.build_flags}
	-DENABLE_SERIAL_DEBUG=0
	-DDEBUG_INA226=0
	-DDEBUG_SENSORS=0
	-O3
	-Wl,--gc-sections
